<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FootballCoach</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- BANNER -->
  <div class="banner">
    <div class="container">
      <h1>FootballCoach</h1>
      <h2>L'appli de coaching Football pour tous les niveaux</h2>
      <a href=" https://www.fff.fr " class="btn-yellow" target="_blank">Découvrir l'appli</a>
    </div>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div class="container">

    <h2>Theo Picon</h2>
    <p class="subtitle">Fondateur & coach certifié Football</p>
    <img class="avatar" src="images/profile.jpeg" alt="Theo Picon">

    <h2>Nos services</h2>
    <div class="cards">

      <div class="card">
        <img src="images/card1.jpg" alt="Cours en ligne">
        <h3>Cours en ligne</h3>
      </div>

      <div class="card">
        <img src="images/card6.jpg" alt="Coaching perso">
        <h3>Coaching perso</h3>
      </div>

      <div class="card">
        <img src="images/card3.jpg" alt="Suivi de progression">
        <h3>Suivi de progression</h3>
      </div>

      <div class="card">
        <img src="images/card4.jpg" alt="Communauté">
        <h3>Communauté</h3>
      </div>

    </div>
  </div>

</body>
</html>
